<!DOCTYPE html>
<html>
<body>

<h3>PDF अपलोड करा</h3>

<input type="file" id="fileInput">
<button onclick="upload()">अपलोड</button>

<script>
function upload() {
  const file = document.getElementById("fileInput").files[0];
  const reader = new FileReader();

  reader.onload = function() {
    const base64 = reader.result.split(',')[1];

    fetch("https://script.google.com/macros/s/AKfycbylpebzsI1GMZHevQUyQX6BGo2UF_VG6SgZB77CclMdLbi0OMtYS8TBNrE28vqqclI/exec", {
      method: "POST",
      body: new URLSearchParams({ file: base64 })
    })
    .then(res => res.text())
    .then(data => alert("Upload Success"));
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>
