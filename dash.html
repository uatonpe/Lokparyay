<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokparyay Daily Collection Dashboard</title>
    <!-- In-line CSS for all-in-one file -->
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #0056b3;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .upload-section {
            background-color: #e9f5ff;
            border: 1px solid #cce5ff;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 6px;
            text-align: center;
        }

        input[type="file"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            background-color: #f8f8f8;
            width: auto;
            max-width: 100%;
            margin-top: 10px;
        }

        input[type="file"]:hover {
            background-color: #e2e6ea;
        }

        .status {
            margin-top: 10px;
            font-weight: bold;
            color: #007bff;
        }

        .dashboard-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 15px;
            background-color: #f0f8ff;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .filter-options button, .action-buttons button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 18px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95em;
            transition: background-color 0.3s ease;
            white-space: nowrap;
        }

        .filter-options button:hover, .action-buttons button:hover {
            background-color: #0056b3;
        }

        .filter-options button.active {
            background-color: #0056b3;
            border: 2px solid #004085;
        }

        .summary-info {
            font-size: 1.05em;
            font-weight: bold;
            color: #28a745;
            text-align: right;
            flex-grow: 1;
            min-width: 250px;
            margin-top: 10px;
        }

        .summary-info p {
            margin: 5px 0;
        }

        .table-responsive {
            overflow-x: auto;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0;
            background-color: #fff;
        }

        table th, table td {
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            text-align: left;
            white-space: nowrap;
        }

        table th {
            background-color: #007bff;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
        }

        table tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        table tbody tr:hover {
            background-color: #eef7ff;
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .dashboard-controls {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-options, .action-buttons {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                margin-bottom: 15px;
            }
            .filter-options button, .action-buttons button {
                flex: 1 1 auto;
                min-width: 120px;
                margin: 5px;
            }
            .summary-info {
                text-align: center;
                margin-top: 15px;
            }
            h1 {
                font-size: 1.7em;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 15px;
            }
            .filter-options button, .action-buttons button {
                padding: 8px 12px;
                font-size: 0.9em;
            }
        }
    </style>
    <!-- PDF.js library is NOT needed for CSV. Removed to reduce file size. -->
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';
    </script> -->
</head>
<body>
    <div class="container">
        <h1>लोक पर्याय पतसंस्था - दैनिक संकलन डॅशबोर्ड</h1>

        <div class="upload-section">
            <label for="csvUpload">दैनिक संकलन रिपोर्ट अपलोड करा (CSV):</label>
            <input type="file" id="csvUpload" accept=".csv">
            <button id="saveToSheetBtn" style="background-color: #28a745; margin-left: 10px;">डेटा शीटमध्ये सेव्ह करा</button>
            <p id="uploadStatus" class="status"></p>
        </div>

        <div class="dashboard-controls">
            <div class="filter-options">
                <button id="filterToday">आजचा रिपोर्ट</button>
                <button id="filterLast7Days">मागील 7 दिवसांचा</button>
                <button id="filterLastMonth">मागील महिन्याचा</button>
                <button id="filterCurrentMonth">चालू महिन्याचा</button>
                <button id="filterAll">सर्व डेटा</button>
            </div>
            <div class="summary-info">
                <!-- Agent Name and GL Head will be populated from CSV data if it's consistent across the file -->
                <p><strong>एकूण एजंट:</strong> <span id="displayAgentCount">0</span></p>
                <p><strong>एकूण योजना:</strong> <span id="displayGLHeadCount">0</span></p>
                <p><strong>डेटाची श्रेणी:</strong> <span id="dataDateRange"></span></p>
                <p><strong>एकूण संकलन रक्कम:</strong> <span id="totalCollection">0.00</span></p>
                <p><strong>एकूण नोंदी:</strong> <span id="totalEntries">0</span></p>
            </div>
        </div>
        
        <div class="table-responsive">
            <table id="collectionTable">
                <thead>
                    <tr>
                        <th>एजेंटचे नाव</th>
                        <th>योजना (GL Head)</th>
                        <th>व्यवहार दिनांक</th>
                        <th>संकलन दिनांक</th>
                        <th>ग्राहक संख्या</th>
                        <th>एकूण संकलन</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will be inserted here by JavaScript -->
                    <tr><td colspan="6">कृपया CSV रिपोर्ट अपलोड करा किंवा डेटा लोड होण्याची प्रतीक्षा करा.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- In-line JavaScript for all-in-one file -->
    <script>
        // *** Google Apps Script API URL (Replace with your deployed API URL) ***
        const GOOGLE_APPS_SCRIPT_API_URL = 'https://script.google.com/macros/s/AKfycbw3gPdUMKZRm1KR56JeKUvXNUU_77OYfe_1d59Wgi14RTxvpIYH6ygj7VUixWcpe9I/exec';

        let parsedCollectionData = []; // Stores parsed data from the currently uploaded CSV (before saving)
        let allSheetData = []; // Stores all data fetched from Google Sheet (after saving)
        
        const csvUploadInput = document.getElementById('csvUpload'); // Changed to csvUpload
        const uploadStatus = document.getElementById('uploadStatus');
        const collectionTableBody = document.querySelector('#collectionTable tbody');
        const totalCollectionSpan = document.getElementById('totalCollection');
        const totalEntriesSpan = document.getElementById('totalEntries');
        const dataDateRangeSpan = document.getElementById('dataDateRange');
        const displayAgentCountSpan = document.getElementById('displayAgentCount'); // Changed to count
        const displayGLHeadCountSpan = document.getElementById('displayGLHeadCount'); // Changed to count
        const saveToSheetBtn = document.getElementById('saveToSheetBtn');

        const filterTodayBtn = document.getElementById('filterToday');
        const filterLast7DaysBtn = document.getElementById('filterLast7Days');
        const filterLastMonthBtn = document.getElementById('filterLastMonth');
        const filterCurrentMonthBtn = document.getElementById('filterCurrentMonth');
        const filterAllBtn = document.getElementById('filterAll');

        // Helper function to parse DD.MM.YYYY to Date object
        function parseDate(dateString) {
            if (!dateString) return null;
            const parts = dateString.split('.');
            if (parts.length === 3) {
                return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
            }
            return null;
        }

        // Helper function to format Date object to DD.MM.YYYY
        function formatDate(date) {
            if (!date) return '';
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}.${month}.${year}`;
        }
        
        // CSV Parsing Logic
        async function parseCsv(file) {
            uploadStatus.textContent = 'CSV वाचत आहे... कृपया प्रतीक्षा करा.';
            parsedCollectionData = []; // Reset parsed data for new upload
            let tempAgentName = 'N/A';
            let tempGLHead = 'N/A';

            const reader = new FileReader();
            reader.onload = async function(event) {
                const csvText = event.target.result;
                const lines = csvText.split('\n');

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;

                    // Split CSV line by comma, respecting quoted fields
                    // A simple split(',') might break if values contain commas, so a basic CSV parser logic
                    const values = [];
                    let inQuote = false;
                    let currentValue = "";
                    for (let j = 0; j < line.length; j++) {
                        const char = line[j];
                        if (char === '"') {
                            inQuote = !inQuote;
                            // If it's a quote and the next char is also a quote, it's an escaped quote
                            if (inQuote && line[j + 1] === '"') {
                                currentValue += '"';
                                j++; // Skip the next quote
                            }
                        } else if (char === ',' && !inQuote) {
                            values.push(currentValue.trim());
                            currentValue = "";
                        } else {
                            currentValue += char;
                        }
                    }
                    values.push(currentValue.trim()); // Add the last value

                    // From your CSV example:
                    // "Daily Collection","Trasaction Date :  ","19.03.2026","To   ","14.04.2026","GL Head :","Kubera Dhansanchay Yojana","Agent Name :","SHENDAGE  BALAJI CHANDAR","Agent No. :",1,"Agent Branch No. :",1,"Transaction Date","A/C No.","A/C Holder","Collection Date","Collection Amount","19.03.2026","Total :",200,"Total :",191400,"Print Date :","Peocit Software Solutions","14.04.2026","Print By : ","vstodkar"," Page No.  1 / 1"
                    // The structure is very flat and repeats headers. This needs careful parsing.

                    // Check if it's a header line that specifies Agent Name or GL Head
                    if (values[5] === "GL Head :" && values[7] === "Agent Name :") {
                        tempGLHead = values[6] ? values[6].replace(/"/g, '') : 'N/A';
                        tempAgentName = values[8] ? values[8].replace(/"/g, '') : 'N/A';
                    }

                    // Check if it's a line specifying a Transaction Date (group header in PDF)
                    // The Transaction Date is the 19th item in your header-like lines
                    let currentTransactionDate = values[19];
                    if (currentTransactionDate && currentTransactionDate.match(/^\d{2}\.\d{2}\.\d{4}$/)) {
                        // This seems to be the transaction date line for a group of records
                        // The actual data records follow these lines
                        // We need to parse records from a specific pattern which appears right after these headers
                        // The next lines in the CSV are just repeats of the main header, until the actual data starts.
                        // This CSV is structured in a very redundant way, with each data row containing all headers.
                        
                        // We need to specifically identify the data rows.
                        // In your original PDF, data rows were: A/C No, A/C Holder, Collection Date, Collection Amount
                        // In this CSV, these would be at indices 15, 16, 17, 18.
                        
                        const acNo = values[15] ? values[15].replace(/"/g, '') : '';
                        const acHolder = values[16] ? values[16].replace(/"/g, '') : '';
                        const collectionDate = values[17] ? values[17].replace(/"/g, '') : '';
                        const collectionAmount = values[18] ? parseFloat(values[18].replace(/,/g, '').replace(/"/g, '')) : 0;
                        
                        // Filter out actual header rows and total rows that might match the pattern
                        if (acNo && acHolder && collectionDate && !isNaN(collectionAmount) &&
                            acNo !== "A/C No." && acHolder !== "A/C Holder" && collectionDate !== "Collection Date" &&
                            !line.includes("Total :") && !line.includes("Print Date :")) {
                            
                            parsedCollectionData.push({
                                agentName: tempAgentName,
                                glHead: tempGLHead,
                                transactionDate: currentTransactionDate, // Use the detected transaction date
                                acNo: acNo,
                                acHolder: acHolder,
                                collectionDate: collectionDate,
                                collectionAmount: collectionAmount
                            });
                        }
                    } else if (values[15] && values[16] && values[17] && values[18]) {
                        // This handles lines where the Transaction Date (values[19]) is empty
                        // but it's an actual data record. We need to infer the Transaction Date 
                        // from the previous valid transaction date.
                        // However, given the CSV structure, each line already contains its own "Transaction Date" equivalent
                        // which is at index 19 (your sample PDF had it as a group header)

                        // Let's re-evaluate based on the provided CSV:
                        // The "Transaction Date" column in the data table is at index 14
                        // The "A/C No" is at index 15
                        // The "A/C Holder" is at index 16
                        // The "Collection Date" is at index 17
                        // The "Collection Amount" is at index 18

                        // The 19th item in the array `values[19]` is the *grouping* Transaction Date, e.g., "19.03.2026"
                        // This grouping transaction date changes only when a new group starts.
                        // The actual "Transaction Date" for a record (values[14]) is not always present in your PDF.

                        // Let's use values[19] as the TransactionDate for grouping and parsing data entries.
                        // This makes the parsing logic much simpler for your CSV.
                        
                        // Data from CSV:
                        // Agent Name (values[8]), GL Head (values[6]), Transaction Date (values[19]), 
                        // A/C No. (values[15]), A/C Holder (values[16]), Collection Date (values[17]), Collection Amount (values[18])

                        const agentNameFromCsv = values[8] ? values[8].replace(/"/g, '').trim() : 'N/A';
                        const glHeadFromCsv = values[6] ? values[6].replace(/"/g, '').trim() : 'N/A';
                        const transactionDateFromCsv = values[19] ? values[19].replace(/"/g, '').trim() : 'N/A'; // Grouping date
                        const acNoFromCsv = values[15] ? values[15].replace(/"/g, '').trim() : '';
                        const acHolderFromCsv = values[16] ? values[16].replace(/"/g, '').trim() : '';
                        const collectionDateFromCsv = values[17] ? values[17].replace(/"/g, '').trim() : '';
                        const collectionAmountFromCsv = values[18] ? parseFloat(values[18].replace(/,/g, '').replace(/"/g, '')) : 0;
                        
                        // Let's use the actual Transaction Date from column 14 if it exists, otherwise fallback to the grouping date.
                        // Your PDF shows a "Transaction Date" column (leftmost in the table).
                        // In your CSV sample, values[14] is "Transaction Date" (the header), but in actual data rows, it's empty.
                        // So, we MUST rely on values[19] as the effective "Transaction Date" for grouping in the dashboard.
                        // And values[17] is the "Collection Date".

                        // Ensure it's an actual data row and not a header or total line
                        if (acNoFromCsv && acHolderFromCsv && collectionDateFromCsv && !isNaN(collectionAmountFromCsv) &&
                            acNoFromCsv !== "A/C No." && acHolderFromCsv !== "A/C Holder" && collectionDateFromCsv !== "Collection Date" &&
                            !line.includes("Total :") && !line.includes("Print Date :")) {

                            parsedCollectionData.push({
                                agentName: agentNameFromCsv,
                                glHead: glHeadFromCsv,
                                transactionDate: transactionDateFromCsv, // This is the grouping date from CSV structure
                                acNo: acNoFromCsv,
                                acHolder: acHolderFromCsv,
                                collectionDate: collectionDateFromCsv,
                                collectionAmount: collectionAmountFromCsv
                            });
                            // Update current agent/gl head if they change in the CSV (though your CSV repeats them)
                            tempAgentName = agentNameFromCsv;
                            tempGLHead = glHeadFromCsv;
                        }
                    }
                }

                if (parsedCollectionData.length > 0) {
                    uploadStatus.textContent = `CSV यशस्वीरित्या वाचले. एकूण ${parsedCollectionData.length} नोंदी आढळल्या. डेटा शीटमध्ये सेव्ह करण्यासाठी 'डेटा शीटमध्ये सेव्ह करा' बटणावर क्लिक करा.`;
                    renderDashboard(parsedCollectionData); // Show parsed data temporarily
                    saveToSheetBtn.style.display = 'inline-block'; // Show save button
                } else {
                    uploadStatus.textContent = 'CSV वाचले, परंतु कोणताही डेटा आढळला नाही. कृपया रिपोर्टची रचना तपासा.';
                    renderDashboard([]);
                    saveToSheetBtn.style.display = 'none';
                }

            };
            reader.readAsText(file); // Read as text for CSV
        }

        // Function to save data to Google Sheet via Apps Script
        async function saveParsedDataToSheet() {
            if (parsedCollectionData.length === 0) {
                uploadStatus.textContent = 'सेव्ह करण्यासाठी कोणताही डेटा नाही.';
                return;
            }

            uploadStatus.textContent = 'डेटा शीटमध्ये सेव्ह करत आहे...';
            try {
                const response = await fetch(GOOGLE_APPS_SCRIPT_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        agentName: parsedCollectionData[0].agentName, // Assuming agentName and glHead are consistent for a single uploaded CSV
                        glHead: parsedCollectionData[0].glHead,
                        collectionEntries: parsedCollectionData
                    }),
                });

                const result = await response.json();

                if (result.success) {
                    uploadStatus.textContent = `डेटा यशस्वीरित्या सेव्ह झाला: ${result.message}`;
                    parsedCollectionData = []; // Clear parsed data after saving
                    csvUploadInput.value = ''; // Clear file input
                    saveToSheetBtn.style.display = 'none';
                    await fetchAndRenderData(); // Fetch and render data from sheet after saving
                } else {
                    uploadStatus.textContent = `डेटा सेव्ह करताना त्रुटी: ${result.message}`;
                }
            } catch (error) {
                uploadStatus.textContent = `Google Apps Script API मध्ये त्रुटी: ${error.message}`;
                console.error("API Error:", error);
            }
        }

        // Function to fetch data from Google Sheet API and render the dashboard
        async function fetchAndRenderData() {
            uploadStatus.textContent = 'Google Sheet मधून डेटा लोड करत आहे...';
            try {
                const response = await fetch(GOOGLE_APPS_SCRIPT_API_URL, {
                    method: 'GET',
                });
                const data = await response.json();

                if (data && data.success === false) { // Check for error object from Apps Script
                    uploadStatus.textContent = `डेटा लोड करताना त्रुटी: ${data.message}`;
                    renderDashboard([]);
                    return;
                }
                allSheetData = data;
                if (allSheetData.length > 0) {
                    uploadStatus.textContent = `Google Sheet मधून ${allSheetData.length} नोंदी लोड केल्या.`;
                } else {
                    uploadStatus.textContent = 'Google Sheet मध्ये कोणताही डेटा आढळला नाही.';
                }
                applyFilter('currentMonth'); // Default filter after loading all data
            } catch (error) {
                uploadStatus.textContent = `Google Apps Script API मध्ये डेटा लोड करताना त्रुții: ${error.message}`;
                console.error("API Error:", error);
                renderDashboard([]);
            }
        }

        // Render dashboard with filtered data (Summary View)
        function renderDashboard(dataToDisplay) {
            collectionTableBody.innerHTML = ''; // Clear existing table rows
            let totalAmount = 0;
            let minDate = null;
            let maxDate = null;
            const uniqueAgents = new Set();
            const uniqueGLHeads = new Set();

            if (dataToDisplay.length === 0) {
                collectionTableBody.innerHTML = '<tr><td colspan="6">या फिल्टरसाठी कोणताही डेटा उपलब्ध नाही.</td></tr>';
            } else {
                // Group by Collection Date, Agent, GL Head for daily summary
                const dailySummary = {}; // Key: "YYYY-MM-DD_AgentName_GLHead"

                dataToDisplay.forEach(item => {
                    uniqueAgents.add(item.agentName);
                    uniqueGLHeads.add(item.glHead);

                    const colDate = parseDate(item.collectionDate);
                    const dateKey = colDate ? formatDate(colDate) : 'UnknownDate'; // Use formatted date for grouping
                    const groupKey = `${dateKey}_${item.agentName}_${item.glHead}`;

                    if (!dailySummary[groupKey]) {
                        dailySummary[groupKey] = {
                            agentName: item.agentName,
                            glHead: item.glHead,
                            collectionDate: item.collectionDate,
                            transactionDates: new Set(), // To count unique transaction dates
                            acNos: new Set(), // To count unique customers
                            totalCollection: 0
                        };
                    }
                    dailySummary[groupKey].transactionDates.add(item.transactionDate); // Keep track of multiple transaction dates for a single collection date
                    dailySummary[groupKey].acNos.add(item.acNo);
                    dailySummary[groupKey].totalCollection += item.collectionAmount;

                    // Update min/max collection dates for overall range
                    if (colDate) {
                        if (!minDate || colDate < minDate) minDate = colDate;
                        if (!maxDate || colDate > maxDate) maxDate = colDate;
                    }
                });

                // Sort by Collection Date
                const sortedSummaries = Object.values(dailySummary).sort((a, b) => {
                    return parseDate(a.collectionDate) - parseDate(b.collectionDate);
                });

                sortedSummaries.forEach(summary => {
                    const row = collectionTableBody.insertRow();
                    row.insertCell().textContent = summary.agentName;
                    row.insertCell().textContent = summary.glHead;
                    row.insertCell().textContent = Array.from(summary.transactionDates).join(', '); // Show unique transaction dates
                    row.insertCell().textContent = summary.collectionDate;
                    row.insertCell().textContent = `${summary.acNos.size} ग्राहक`; // Number of unique customers
                    row.insertCell().textContent = summary.totalCollection.toFixed(2);
                    totalAmount += summary.totalCollection;
                });
            }

            totalCollectionSpan.textContent = totalAmount.toFixed(2);
            totalEntriesSpan.textContent = dataToDisplay.length; // Still counts raw entries for consistency

            displayAgentCountSpan.textContent = uniqueAgents.size; // Update agent count
            displayGLHeadCountSpan.textContent = uniqueGLHeads.size; // Update GL Head count

            if (minDate && maxDate) {
                dataDateRangeSpan.textContent = `${formatDate(minDate)} ते ${formatDate(maxDate)}`;
            } else {
                dataDateRangeSpan.textContent = 'उपलब्ध नाही';
            }
        }

        // Filter logic
        function applyFilter(filterType) {
            let dataToFilter = allSheetData.length > 0 ? allSheetData : parsedCollectionData; // Filter from sheet data if available, else parsed
            let filteredData = [];
            const today = new Date();
            today.setHours(0, 0, 0, 0); // Reset time for accurate date comparison

            let currentMonthStart = new Date(today.getFullYear(), today.getMonth(), 1);
            let currentMonthEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            currentMonthEnd.setHours(23, 59, 59, 999);

            let lastMonthStart = new Date(today.getFullYear(), today.getMonth() - 1, 1);
            let lastMonthEnd = new Date(today.getFullYear(), today.getMonth(), 0);
            lastMonthEnd.setHours(23, 59, 59, 999);

            // Deactivate all buttons
            [filterTodayBtn, filterLast7DaysBtn, filterLastMonthBtn, filterCurrentMonthBtn, filterAllBtn].forEach(btn => {
                btn.classList.remove('active');
            });

            switch (filterType) {
                case 'today':
                    filteredData = dataToFilter.filter(item => {
                        const colDate = parseDate(item.collectionDate);
                        return colDate && colDate.toDateString() === today.toDateString();
                    });
                    filterTodayBtn.classList.add('active');
                    break;
                case 'last7Days':
                    const sevenDaysAgo = new Date(today);
                    sevenDaysAgo.setDate(today.getDate() - 7);
                    sevenDaysAgo.setHours(0, 0, 0, 0);
                    filteredData = dataToFilter.filter(item => {
                        const colDate = parseDate(item.collectionDate);
                        return colDate && colDate >= sevenDaysAgo && colDate <= today;
                    });
                    filterLast7DaysBtn.classList.add('active');
                    break;
                case 'lastMonth':
                    filteredData = dataToFilter.filter(item => {
                        const colDate = parseDate(item.collectionDate);
                        return colDate && colDate >= lastMonthStart && colDate <= lastMonthEnd;
                    });
                    filterLastMonthBtn.classList.add('active');
                    break;
                case 'currentMonth':
                    filteredData = dataToFilter.filter(item => {
                        const colDate = parseDate(item.collectionDate);
                        return colDate && colDate >= currentMonthStart && colDate <= currentMonthEnd;
                    });
                    filterCurrentMonthBtn.classList.add('active');
                    break;
                case 'all':
                default:
                    filteredData = [...dataToFilter]; // Copy all data
                    filterAllBtn.classList.add('active');
                    break;
            }
            renderDashboard(filteredData);
        }

        // Event Listeners
        csvUploadInput.addEventListener('change', (event) => { // Changed to csvUploadInput
            const file = event.target.files[0];
            if (file) {
                parseCsv(file); // Call parseCsv for CSV files
            } else {
                uploadStatus.textContent = 'कृपया एक CSV फाइल निवडा.';
                renderDashboard([]);
                saveToSheetBtn.style.display = 'none';
            }
        });

        saveToSheetBtn.addEventListener('click', saveParsedDataToSheet);
        filterTodayBtn.addEventListener('click', () => applyFilter('today'));
        filterLast7DaysBtn.addEventListener('click', () => applyFilter('last7Days'));
        filterLastMonthBtn.addEventListener('click', () => applyFilter('lastMonth'));
        filterCurrentMonthBtn.addEventListener('click', () => applyFilter('currentMonth'));
        filterAllBtn.addEventListener('click', () => applyFilter('all'));

        // Initial load: Fetch existing data from Google Sheet
        document.addEventListener('DOMContentLoaded', () => {
            saveToSheetBtn.style.display = 'none'; // Hide save button initially
            fetchAndRenderData();
        });
    </script>
</body>
</html>
