<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokparyay Daily Collection Dashboard</title>
    <!-- In-line CSS for all-in-one file -->
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #0056b3;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .upload-section {
            background-color: #e9f5ff;
            border: 1px solid #cce5ff;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 6px;
            text-align: center;
        }

        input[type="file"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            background-color: #f8f8f8;
            width: auto;
            max-width: 100%;
            margin-top: 10px;
        }

        input[type="file"]:hover {
            background-color: #e2e6ea;
        }

        .status {
            margin-top: 10px;
            font-weight: bold;
            color: #007bff;
        }

        .dashboard-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 15px;
            background-color: #f0f8ff;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .filter-options button, .action-buttons button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 18px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.95em;
            transition: background-color 0.3s ease;
            white-space: nowrap;
        }

        .filter-options button:hover, .action-buttons button:hover {
            background-color: #0056b3;
        }

        .filter-options button.active {
            background-color: #0056b3;
            border: 2px solid #004085;
        }

        .summary-info {
            font-size: 1.05em;
            font-weight: bold;
            color: #28a745;
            text-align: right;
            flex-grow: 1;
            min-width: 250px;
            margin-top: 10px;
        }

        .summary-info p {
            margin: 5px 0;
        }

        .table-responsive {
            overflow-x: auto;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 0;
            background-color: #fff;
        }

        table th, table td {
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            text-align: left;
            white-space: nowrap;
        }

        table th {
            background-color: #007bff;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
        }

        table tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        table tbody tr:hover {
            background-color: #eef7ff;
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .dashboard-controls {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-options, .action-buttons {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                margin-bottom: 15px;
            }
            .filter-options button, .action-buttons button {
                flex: 1 1 auto;
                min-width: 120px;
                margin: 5px;
            }
            .summary-info {
                text-align: center;
                margin-top: 15px;
            }
            h1 {
                font-size: 1.7em;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 15px;
            }
            .filter-options button, .action-buttons button {
                padding: 8px 12px;
                font-size: 0.9em;
            }
        }
    </style>

    <!-- PDF.js library for PDF parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';
    </script>
</head>
<body>
    <div class="container">
        <h1>लोक पर्याय पतसंस्था - दैनिक संकलन डॅशबोर्ड</h1>

        <div class="upload-section">
            <label for="pdfUpload">दैनिक संकलन रिपोर्ट अपलोड करा (PDF):</label>
            <input type="file" id="pdfUpload" accept=".pdf">
            <button id="saveToSheetBtn" style="background-color: #28a745; margin-left: 10px;">डेटा शीटमध्ये सेव्ह करा</button>
            <p id="uploadStatus" class="status"></p>
        </div>

        <div class="dashboard-controls">
            <div class="filter-options">
                <button id="filterToday">आजचा रिपोर्ट</button>
                <button id="filterLast7Days">मागील 7 दिवसांचा</button>
                <button id="filterLastMonth">मागील महिन्याचा</button>
                <button id="filterCurrentMonth">चालू महिन्याचा</button>
                <button id="filterAll">सर्व डेटा</button>
            </div>
            <div class="summary-info">
                <p><strong>एजेंटचे नाव:</strong> <span id="displayAgentName">N/A</span></p>
                <p><strong>योजना:</strong> <span id="displayGLHead">N/A</span></p>
                <p><strong>डेटाची श्रेणी:</strong> <span id="dataDateRange"></span></p>
                <p><strong>एकूण संकलन रक्कम:</strong> <span id="totalCollection">0.00</span></p>
                <p><strong>एकूण नोंदी:</strong> <span id="totalEntries">0</span></p>
            </div>
        </div>
        
        <div class="table-responsive">
            <table id="collectionTable">
                <thead>
                    <tr>
                        <th>एजेंटचे नाव</th>
                        <th>योजना (GL Head)</th>
                        <th>व्यवहार दिनांक</th>
                        <th>संकलन दिनांक</th>
                        <th>ग्राहक संख्या</th>
                        <th>एकूण संकलन</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data will be inserted here by JavaScript -->
                    <tr><td colspan="6">कृपया PDF रिपोर्ट अपलोड करा किंवा डेटा लोड होण्याची प्रतीक्षा करा.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- In-line JavaScript for all-in-one file -->
    <script>
        // *** Google Apps Script API URL (Replace with your deployed API URL) ***
        const GOOGLE_APPS_SCRIPT_API_URL = 'https://script.google.com/macros/s/AKfycbzkF6WGzroAgke9FIg0kmpaNo7pZQ10-MZCc1oGWInDb-Ot-34Er105xmropIdP0JI/exec';

        let parsedCollectionData = []; // Stores parsed data from the currently uploaded PDF (before saving)
        let allSheetData = []; // Stores all data fetched from Google Sheet (after saving)
        let currentAgentName = 'N/A'; // To store the agent name from the PDF header
        let currentGLHead = 'N/A'; // To store the GL Head from the PDF header

        const pdfUploadInput = document.getElementById('pdfUpload');
        const uploadStatus = document.getElementById('uploadStatus');
        const collectionTableBody = document.querySelector('#collectionTable tbody');
        const totalCollectionSpan = document.getElementById('totalCollection');
        const totalEntriesSpan = document.getElementById('totalEntries');
        const dataDateRangeSpan = document.getElementById('dataDateRange');
        const displayAgentNameSpan = document.getElementById('displayAgentName');
        const displayGLHeadSpan = document.getElementById('displayGLHead');
        const saveToSheetBtn = document.getElementById('saveToSheetBtn');

        const filterTodayBtn = document.getElementById('filterToday');
        const filterLast7DaysBtn = document.getElementById('filterLast7Days');
        const filterLastMonthBtn = document.getElementById('filterLastMonth');
        const filterCurrentMonthBtn = document.getElementById('filterCurrentMonth');
        const filterAllBtn = document.getElementById('filterAll');

        // Helper function to parse DD.MM.YYYY to Date object
        function parseDate(dateString) {
            if (!dateString) return null;
            const parts = dateString.split('.');
            if (parts.length === 3) {
                return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
            }
            return null;
        }

        // Helper function to format Date object to DD.MM.YYYY
        function formatDate(date) {
            if (!date) return '';
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}.${month}.${year}`;
        }

        // Main PDF parsing logic
        async function parsePdf(file) {
            uploadStatus.textContent = 'PDF वाचत आहे... कृपया प्रतीक्षा करा.';
            parsedCollectionData = []; // Reset parsed data for new upload
            currentAgentName = 'N/A';
            currentGLHead = 'N/A';
            displayAgentNameSpan.textContent = 'N/A';
            displayGLHeadSpan.textContent = 'N/A';

            const reader = new FileReader();
            reader.onload = async function() {
                try {
                    const typedArray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedArray).promise;
                    const numPages = pdf.numPages;
                    let rawText = '';

                    for (let i = 1; i <= numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        rawText += textContent.items.map(item => item.str).join('\n'); // Join with newline for better line-by-line processing
                    }

                    // --- Extract Agent Name and GL Head from the first few lines ---
                    const lines = rawText.split('\n');
                    for (const line of lines) {
                        const agentNameMatch = line.match(/Agent Name:\s*(.+?)\s*Agent No\.:/);
                        if (agentNameMatch && agentNameMatch[1]) {
                            currentAgentName = agentNameMatch[1].trim();
                        }
                        const glHeadMatch = line.match(/GL Head:\s*(.+?)\s*Agent Name:/);
                        if (glHeadMatch && glHeadMatch[1]) {
                            currentGLHead = glHeadMatch[1].trim();
                        }
                        if (currentAgentName !== 'N/A' && currentGLHead !== 'N/A') break; // Found both, no need to search more
                    }

                    displayAgentNameSpan.textContent = currentAgentName;
                    displayGLHeadSpan.textContent = currentGLHead;

                    let tempTransactionDate = ''; // To capture the Transaction Date header

                    // Regex to capture the Transaction Date header
                    const transactionDatePattern = /^\s*(\d{2}\.\d{2}\.\d{4})\s*$/; // Ex: "25.03.2026" on its own line

                    // Regex to capture data row: A/C No. (5 digits) + A/C Holder + Collection Date (DD.MM.YYYY) + Collection Amount (float/int with commas)
                    // The A/C Holder part is tricky due to varying lengths and potential spaces.
                    // This is an attempt to be more flexible. It captures anything between A/C No and Collection Date.
                    const dataRowPattern = /^\s*(\d{5})\s+([A-Za-z0-9\s\.\-]+?)\s+(\d{2}\.\d{2}\.\d{4})\s+([\d,]+\.\d{2})\s*$/;
                    
                    for (const line of lines) {
                        const cleanLine = line.trim();

                        if (cleanLine.includes("Transaction Date") && cleanLine.includes("Collection Amount")) continue; // Skip table header lines
                        if (cleanLine.includes("Total :")) continue; // Skip total lines from PDF (if present on data-like lines)

                        // Check for Transaction Date header
                        const transDateMatch = cleanLine.match(transactionDatePattern);
                        if (transDateMatch) {
                            tempTransactionDate = transDateMatch[1];
                            continue;
                        }

                        // Check for data row
                        const dataMatch = cleanLine.match(dataRowPattern);
                        if (dataMatch && tempTransactionDate) { // Ensure a transaction date was found before processing data
                            parsedCollectionData.push({
                                agentName: currentAgentName,
                                glHead: currentGLHead,
                                transactionDate: tempTransactionDate, // Use the last captured transaction date
                                acNo: dataMatch[1],
                                acHolder: dataMatch[2].trim(),
                                collectionDate: dataMatch[3],
                                collectionAmount: parseFloat(dataMatch[4].replace(/,/g, ''))
                            });
                        }
                    }

                    if (parsedCollectionData.length > 0) {
                        uploadStatus.textContent = `PDF यशस्वीरित्या वाचले. एकूण ${parsedCollectionData.length} नोंदी आढळल्या. डेटा शीटमध्ये सेव्ह करण्यासाठी 'डेटा शीटमध्ये सेव्ह करा' बटणावर क्लिक करा.`;
                        renderDashboard(parsedCollectionData); // Show parsed data temporarily
                        saveToSheetBtn.style.display = 'inline-block'; // Show save button
                    } else {
                        uploadStatus.textContent = 'PDF वाचले, परंतु कोणताही डेटा आढळला नाही. कृपया रिपोर्टची रचना तपासा.';
                        renderDashboard([]);
                        saveToSheetBtn.style.display = 'none';
                    }

                } catch (error) {
                    console.error('PDF वाचताना किंवा प्रक्रिया करताना त्रुटी:', error);
                    uploadStatus.textContent = 'PDF वाचताना किंवा प्रक्रिया करताना त्रुटी आली. कृपया वैध PDF फाइल अपलोड करा.';
                    renderDashboard([]);
                    saveToSheetBtn.style.display = 'none';
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // Function to save data to Google Sheet via Apps Script API
        async function saveParsedDataToSheet() {
            if (parsedCollectionData.length === 0) {
                uploadStatus.textContent = 'सेव्ह करण्यासाठी कोणताही डेटा नाही.';
                return;
            }

            uploadStatus.textContent = 'डेटा शीटमध्ये सेव्ह करत आहे...';
            try {
                const response = await fetch(GOOGLE_APPS_SCRIPT_API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        agentName: currentAgentName,
                        glHead: currentGLHead,
                        collectionEntries: parsedCollectionData
                    }),
                });

                const result = await response.json();

                if (result.success) {
                    uploadStatus.textContent = `डेटा यशस्वीरित्या सेव्ह झाला: ${result.message}`;
                    parsedCollectionData = []; // Clear parsed data after saving
                    pdfUploadInput.value = ''; // Clear file input
                    saveToSheetBtn.style.display = 'none';
                    await fetchAndRenderData(); // Fetch and render data from sheet after saving
                } else {
                    uploadStatus.textContent = `डेटा सेव्ह करताना त्रुटी: ${result.message}`;
                }
            } catch (error) {
                uploadStatus.textContent = `Google Apps Script API मध्ये त्रुटी: ${error.message}`;
                console.error("API Error:", error);
            }
        }

        // Function to fetch data from Google Sheet API and render the dashboard
        async function fetchAndRenderData() {
            uploadStatus.textContent = 'Google Sheet मधून डेटा लोड करत आहे...';
            try {
                const response = await fetch(GOOGLE_APPS_SCRIPT_API_URL, {
                    method: 'GET',
                });
                const data = await response.json();

                if (data && data.success === false) { // Check for error object from Apps Script
                    uploadStatus.textContent = `डेटा लोड करताना त्रुटी: ${data.message}`;
                    renderDashboard([]);
                    return;
                }
                allSheetData = data;
                if (allSheetData.length > 0) {
                    uploadStatus.textContent = `Google Sheet मधून ${allSheetData.length} नोंदी लोड केल्या.`;
                } else {
                    uploadStatus.textContent = 'Google Sheet मध्ये कोणताही डेटा आढळला नाही.';
                }
                applyFilter('currentMonth'); // Default filter after loading all data
            } catch (error) {
                uploadStatus.textContent = `Google Apps Script API मध्ये डेटा लोड करताना त्रुटी: ${error.message}`;
                console.error("API Error:", error);
                renderDashboard([]);
            }
        }

        // Render dashboard with filtered data (Summary View)
        function renderDashboard(dataToDisplay) {
            collectionTableBody.innerHTML = ''; // Clear existing table rows
            let totalAmount = 0;
            let minDate = null;
            let maxDate = null;

            if (dataToDisplay.length === 0) {
                collectionTableBody.innerHTML = '<tr><td colspan="6">या फिल्टरसाठी कोणताही डेटा उपलब्ध नाही.</td></tr>';
            } else {
                // Group by Collection Date, Agent, GL Head for daily summary
                const dailySummary = {}; // Key: "YYYY-MM-DD_AgentName_GLHead"

                dataToDisplay.forEach(item => {
                    const colDate = parseDate(item.collectionDate);
                    const dateKey = colDate ? formatDate(colDate) : 'UnknownDate'; // Use formatted date for grouping
                    const groupKey = `${dateKey}_${item.agentName}_${item.glHead}`;

                    if (!dailySummary[groupKey]) {
                        dailySummary[groupKey] = {
                            agentName: item.agentName,
                            glHead: item.glHead,
                            collectionDate: item.collectionDate,
                            transactionDates: new Set(), // To count unique transaction dates
                            acNos: new Set(), // To count unique customers
                            totalCollection: 0
                        };
                    }
                    dailySummary[groupKey].transactionDates.add(item.transactionDate);
                    dailySummary[groupKey].acNos.add(item.acNo);
                    dailySummary[groupKey].totalCollection += item.collectionAmount;

                    // Update min/max collection dates for overall range
                    if (colDate) {
                        if (!minDate || colDate < minDate) minDate = colDate;
                        if (!maxDate || colDate > maxDate) maxDate = colDate;
                    }
                });

                // Sort by Collection Date
                const sortedSummaries = Object.values(dailySummary).sort((a, b) => {
                    return parseDate(a.collectionDate) - parseDate(b.collectionDate);
                });

                sortedSummaries.forEach(summary => {
                    const row = collectionTableBody.insertRow();
                    row.insertCell().textContent = summary.agentName;
                    row.insertCell().textContent = summary.glHead;
                    row.insertCell().textContent = Array.from(summary.transactionDates).join(', '); // Show unique transaction dates
                    row.insertCell().textContent = summary.collectionDate;
                    row.insertCell().textContent = `${summary.acNos.size} ग्राहक`; // Number of unique customers
                    row.insertCell().textContent = summary.totalCollection.toFixed(2);
                    totalAmount += summary.totalCollection;
                });
            }

            totalCollectionSpan.textContent = totalAmount.toFixed(2);
            totalEntriesSpan.textContent = dataToDisplay.length; // Still counts raw entries for consistency

            if (minDate && maxDate) {
                dataDateRangeSpan.textContent = `${formatDate(minDate)} ते ${formatDate(maxDate)}`;
            } else {
                dataDateRangeSpan.textContent = 'उपलब्ध नाही';
            }
        }

        // Filter logic
        function applyFilter(filterType) {
            let dataToFilter = allSheetData.length > 0 ? allSheetData : parsedCollectionData; // Filter from sheet data if available, else parsed
            let filteredData = [];
            const today = new Date();
            today.setHours(0, 0, 0, 0); // Reset time for accurate date comparison

            let currentMonthStart = new Date(today.getFullYear(), today.getMonth(), 1);
            let currentMonthEnd = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            currentMonthEnd.setHours(23, 59, 59, 999);

            let lastMonthStart = new Date(today.getFullYear(), today.getMonth() - 1, 1);
            let lastMonthEnd = new Date(today.getFullYear(), today.getMonth(), 0);
            lastMonthEnd.setHours(23, 59, 59, 999);

            // Deactivate all buttons
            [filterTodayBtn, filterLast7DaysBtn, filterLastMonthBtn, filterCurrentMonthBtn, filterAllBtn].forEach(btn => {
                btn.classList.remove('active');
            });

            switch (filterType) {
                case 'today':
                    filteredData = dataToFilter.filter(item => {
                        const colDate = parseDate(item.collectionDate);
                        return colDate && colDate.toDateString() === today.toDateString();
                    });
                    filterTodayBtn.classList.add('active');
                    break;
                case 'last7Days':
                    const sevenDaysAgo = new Date(today);
                    sevenDaysAgo.setDate(today.getDate() - 7);
                    sevenDaysAgo.setHours(0, 0, 0, 0);
                    filteredData = dataToFilter.filter(item => {
                        const colDate = parseDate(item.collectionDate);
                        return colDate && colDate >= sevenDaysAgo && colDate <= today;
                    });
                    filterLast7DaysBtn.classList.add('active');
                    break;
                case 'lastMonth':
                    filteredData = dataToFilter.filter(item => {
                        const colDate = parseDate(item.collectionDate);
                        return colDate && colDate >= lastMonthStart && colDate <= lastMonthEnd;
                    });
                    filterLastMonthBtn.classList.add('active');
                    break;
                case 'currentMonth':
                    filteredData = dataToFilter.filter(item => {
                        const colDate = parseDate(item.collectionDate);
                        return colDate && colDate >= currentMonthStart && colDate <= currentMonthEnd;
                    });
                    filterCurrentMonthBtn.classList.add('active');
                    break;
                case 'all':
                default:
                    filteredData = [...dataToFilter]; // Copy all data
                    filterAllBtn.classList.add('active');
                    break;
            }
            renderDashboard(filteredData);
        }

        // Event Listeners
        pdfUploadInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                parsePdf(file);
            } else {
                uploadStatus.textContent = 'कृपया एक PDF फाइल निवडा.';
                renderDashboard([]);
                saveToSheetBtn.style.display = 'none';
            }
        });

        saveToSheetBtn.addEventListener('click', saveParsedDataToSheet);
        filterTodayBtn.addEventListener('click', () => applyFilter('today'));
        filterLast7DaysBtn.addEventListener('click', () => applyFilter('last7Days'));
        filterLastMonthBtn.addEventListener('click', () => applyFilter('lastMonth'));
        filterCurrentMonthBtn.addEventListener('click', () => applyFilter('currentMonth'));
        filterAllBtn.addEventListener('click', () => applyFilter('all'));

        // Initial load: Fetch existing data from Google Sheet
        document.addEventListener('DOMContentLoaded', () => {
            saveToSheetBtn.style.display = 'none'; // Hide save button initially
            fetchAndRenderData();
        });
    </script>
</body>
</html>
