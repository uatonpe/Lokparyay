<!-- FINAL FULL UI + PERFORMANCE OPTIMIZED ERP -->
<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>लोकपर्याय ERP (FINAL FAST)</title>

<!-- LIGHTWEIGHT CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.min.js" defer></script>

<style>
/* ORIGINAL STYLE + OPTIMIZED */
body{font-family:system-ui;background:#eef2f9;margin:0;color:#1a2744}
.hdr{background:#1d4ed8;color:#fff;padding:12px;font-weight:800}
.card{background:#fff;border-radius:14px;padding:14px;margin:10px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.kpi{padding:14px;border-radius:12px;color:#fff;font-weight:800}
.k1{background:#059669}.k2{background:#1d4ed8}.k3{background:#7c3aed}
.loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:9999}
.hidden{display:none}
input{padding:8px;border-radius:8px;border:1px solid #ddd}
</style>
</head>

<body>

<div class="hdr">📊 लोकपर्याय ERP Dashboard</div>

<div id="ldr" class="loader">⚡ Loading Fast ERP...</div>

<div id="app" class="hidden">

  <!-- KPI -->
  <div id="kpiWrap" class="grid"></div>

  <!-- FILTER -->
  <div class="card">
    <input id="search" placeholder="🔍 Search agent..." />
  </div>

  <!-- TABLE -->
  <div class="card" id="table"></div>

  <!-- CHARTS -->
  <div class="grid">
    <div class="card"><canvas id="chart1"></canvas></div>
    <div class="card"><canvas id="chart2"></canvas></div>
  </div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzVUEN3WqOevswOOD5Ag7M59rB1VcYX9_NGqGtUq8vFiuFdfXG0tRc-Rfz0C8Tbq8E/exec";

const S={data:null,cache:new Map(),charts:{}};

function G(id){return document.getElementById(id)}

function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}}

async function fastFetch(url){
  if(S.cache.has(url)) return S.cache.get(url);
  const res=await fetch(url+"&_="+Date.now());
  const data=await res.json();
  S.cache.set(url,data);
  return data;
}

// PROCESS (NON BLOCKING)
function process(raw){
  const rows=(raw.collections||[]).map(r=>({
    agent:r[2]||"-",
    type:r[1],
    amount:Number(r[5])||0,
    count:Number(r[6])||0
  }));

  const total=rows.reduce((a,b)=>a+b.amount,0);

  const byAgent={};
  rows.forEach(r=>{
    if(!byAgent[r.agent]) byAgent[r.agent]=0;
    byAgent[r.agent]+=r.amount;
  });

  return {rows,total,byAgent};
}

async function load(){
  try{
    const raw=await fastFetch(API+"?action=report");

    // STEP 1 FAST UI
    setTimeout(()=>{
      S.data=process(raw);
      renderKPI();
      G('app').classList.remove('hidden');
      G('ldr').classList.add('hidden');
    },0);

    // STEP 2 TABLE
    setTimeout(renderTable,100);

    // STEP 3 CHARTS (IDLE)
    setTimeout(()=>requestIdleCallback(renderCharts),400);

  }catch(e){alert(e.message)}
}

function renderKPI(){
  const t=S.data.total;

  G('kpiWrap').innerHTML=`
    <div class="kpi k1">💰 Total ₹${t.toLocaleString()}</div>
    <div class="kpi k2">📊 Entries ${S.data.rows.length}</div>
    <div class="kpi k3">👥 Agents ${Object.keys(S.data.byAgent).length}</div>
  `;
}

function renderTable(){
  const rows=S.data.rows.slice(0,150);

  let html="<b>Recent Data:</b><br/>";
  rows.forEach(r=>{
    html+=`${r.agent} | ₹${r.amount}<br/>`;
  });

  G('table').innerHTML=html;
}

function renderCharts(){
  if(!window.Chart) return setTimeout(renderCharts,200);

  const entries=Object.entries(S.data.byAgent).slice(0,10);

  if(S.charts.c1) S.charts.c1.destroy();

  S.charts.c1=new Chart(G('chart1'),{
    type:'bar',
    data:{
      labels:entries.map(x=>x[0]),
      datasets:[{data:entries.map(x=>x[1])}]
    },
    options:{animation:false}
  });

  if(S.charts.c2) S.charts.c2.destroy();

  S.charts.c2=new Chart(G('chart2'),{
    type:'pie',
    data:{
      labels:entries.map(x=>x[0]),
      datasets:[{data:entries.map(x=>x[1])}]
    },
    options:{animation:false}
  });
}

// SEARCH FAST
G('search').addEventListener('input',debounce(()=>{
  const q=G('search').value.toLowerCase();

  const rows=S.data.rows
    .filter(r=>r.agent.toLowerCase().includes(q))
    .slice(0,80);

  let html="";
  rows.forEach(r=>{
    html+=`${r.agent} | ₹${r.amount}<br/>`;
  });

  G('table').innerHTML=html;

},300));

load();

</script>

</body>
</html>
