<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>लोकपर्याय पतसंस्था - स्टाफ डेटा एंट्री</title>
    <!-- तुमचा लोगो URL येथे टाका -->
    <link rel="icon" href="https://raw.githubusercontent.com/tumcha_github_username/lokparyay-patpedhi-dashboard/main/logo.png" type="image/png">
    
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #ff9800;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-radius: 12px;
            --input-border: #ced4da;
            --success: #28a745;
            --danger: #dc3545;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .header {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
            padding-bottom: 100px; /* For fixed bottom button */
        }

        .card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .card-header {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input[type="date"],
        input[type="time"],
        input[type="number"],
        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-size: 16px; /* Prevents iOS zoom */
            transition: border-color 0.2s;
            background-color: #fafafa;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        /* Hide number arrows */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        .section-title {
            font-size: 14px;
            color: var(--secondary-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 15px 0 10px 0;
            font-weight: bold;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        /* Bottom Sticky Button */
        .submit-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            padding: 15px 20px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
            z-index: 100;
            display: flex;
            justify-content: center;
        }

        .btn-submit {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            max-width: 400px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(40, 167, 69, 0.3);
            transition: transform 0.1s, background-color 0.2s;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }
        .btn-submit:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Collapsible Add Agent Section */
        details {
            background: #fff;
            border-radius: var(--border-radius);
            border: 1px solid var(--input-border);
            margin-bottom: 20px;
        }
        summary {
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            color: var(--primary-color);
            outline: none;
        }
        .details-content {
            padding: 15px;
            border-top: 1px solid var(--input-border);
        }

        .btn-secondary {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 80px; /* Above bottom bar */
            transform: translateX(-50%);
            font-size: 16px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 4.5s;
        }
        #toast.success { background-color: var(--success); }
        #toast.error { background-color: var(--danger); }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 80px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 80px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        /* Loader */
        .loader {
            display: none;
            text-align: center;
            padding: 20px;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .grid-3 { grid-template-columns: 1fr 1fr; } /* Stack new accounts input below on very small screens */
            .grid-3 > div:nth-child(3) { grid-column: span 2; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>लोकपर्याय पतसंस्था - एंट्री</h1>
    </div>

    <div class="container">
        
        <!-- Date and Time Card -->
        <div class="card">
            <div class="card-header">आजची तारीख व वेळ</div>
            <div class="form-row">
                <div class="form-group">
                    <label>दिनांक</label>
                    <input type="date" id="entryDate" required>
                </div>
                <div class="form-group">
                    <label>वेळ</label>
                    <input type="time" id="entryTime" required>
                </div>
            </div>
        </div>

        <div id="loadingText" class="loader">सिस्टीम लोड होत आहे, कृपया थांबा...</div>

        <!-- Dynamic Agent Sections will be injected here -->
        <div id="agentsContainer"></div>

        <!-- Bank Balance Card -->
        <div class="card">
            <div class="card-header">बँक बॅलन्स अपडेट (केपीआय)</div>
            <div class="grid-2">
                <div class="form-group">
                    <label>सिस्टिम बॅलन्स (₹)</label>
                    <input type="number" id="systemBalance" inputmode="numeric" value="0">
                </div>
                <div class="form-group">
                    <label>प्रत्यक्ष बँक बॅलन्स (₹)</label>
                    <input type="number" id="bankBalance" inputmode="numeric" value="0">
                </div>
            </div>
            <div class="form-row" style="margin-top:10px;">
                <div class="form-group">
                    <label>जुळणी स्थिती</label>
                    <select id="matchStatus">
                        <option value="जुळले आहे">✅ जुळले आहे</option>
                        <option value="जुळले नाही">❌ जुळले नाही</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>शेरा</label>
                    <input type="text" id="remarks" placeholder="उदा. कॅश जमा केली">
                </div>
            </div>
        </div>

        <!-- Add New Agent (Collapsible) -->
        <details>
            <summary>➕ नवीन एजंट जोडायचा आहे का?</summary>
            <div class="details-content">
                <div class="form-group" style="margin-bottom: 10px;">
                    <label>एजंटचे नाव</label>
                    <input type="text" id="newAgentName">
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>एजंट कोड</label>
                        <input type="text" id="newAgentCode">
                    </div>
                    <div class="form-group">
                        <label>मोबाईल नंबर</label>
                        <input type="number" id="newContactNumber" inputmode="numeric">
                    </div>
                </div>
                <button type="button" class="btn-secondary" onclick="addNewAgent()">एजंट सेव्ह करा</button>
            </div>
        </details>

    </div>

    <!-- Sticky Bottom Submit Button -->
    <div class="submit-container">
        <button type="button" class="btn-submit" id="mainSubmitBtn" onclick="submitAllData()">सर्वांचा डेटा सेव्ह करा</button>
    </div>

    <!-- Toast Message -->
    <div id="toast"></div>

    <script>
        // तुमची युनिफाईड API URL
        const API_URL = 'https://script.google.com/macros/s/AKfycbzEtU_Ye8G-Ojdto2NjYTMu7vI4Da-iXuuIvTU4pzY8-5vol9WWqGAzVMSaIinHCFY/exec'; 

        let globalAgentsList = [];

        // Toast Notification Function
        function showToast(message, type = 'success') {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = "show " + type;
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 5000);
        }

        // Initialize Page
        window.onload = async function() {
            // Set current date and time
            const now = new Date();
            document.getElementById('entryDate').value = now.toISOString().split('T')[0];
            document.getElementById('entryTime').value = now.toTimeString().slice(0, 5);

            document.getElementById('loadingText').style.display = 'block';
            await loadAgents();
            document.getElementById('loadingText').style.display = 'none';
        };

        // Fetch agents via GET and build UI
        async function loadAgents() {
            try {
                const response = await fetch(`${API_URL}?sheet=agents`);
                const data = await response.json();
                
                if (data && !data.error) {
                    globalAgentsList = data;
                    buildAgentCards();
                } else {
                    showToast('एजंट लिस्ट मिळाली नाही.', 'error');
                }
            } catch (error) {
                showToast('नेटवर्क एरर. एजंट लोड झाले नाहीत.', 'error');
                console.error(error);
            }
        }

        // Build HTML cards for each agent automatically
        function buildAgentCards() {
            const container = document.getElementById('agentsContainer');
            container.innerHTML = ''; // Clear existing

            globalAgentsList.forEach((agent, index) => {
                const safeName = agent.एजंटचे_नाव; // Keep original name for value
                const idPrefix = `agent_${index}`; // Unique ID for inputs

                const cardHTML = `
                <div class="card" id="card_${idPrefix}" data-agent-name="${safeName}">
                    <div class="card-header">👤 ${safeName}</div>
                    
                    <div class="section-title">पिग्मी</div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label>खाती</label>
                            <input type="number" id="pigmyCount_${idPrefix}" inputmode="numeric" value="0" onclick="this.select()">
                        </div>
                        <div class="form-group">
                            <label>रक्कम (₹)</label>
                            <input type="number" id="pigmyAmt_${idPrefix}" inputmode="numeric" value="0" onclick="this.select()">
                        </div>
                    </div>

                    <div class="section-title">आरडी (RD)</div>
                    <div class="grid-3">
                        <div class="form-group">
                            <label>खाती</label>
                            <input type="number" id="rdCount_${idPrefix}" inputmode="numeric" value="0" onclick="this.select()">
                        </div>
                        <div class="form-group">
                            <label>रक्कम (₹)</label>
                            <input type="number" id="rdAmt_${idPrefix}" inputmode="numeric" value="0" onclick="this.select()">
                        </div>
                        <div class="form-group">
                            <label>नवीन खाती</label>
                            <input type="number" id="rdNew_${idPrefix}" inputmode="numeric" value="0" onclick="this.select()">
                        </div>
                    </div>

                    <div class="section-title">एफडी (FD)</div>
                    <div class="grid-3">
                        <div class="form-group">
                            <label>खाती</label>
                            <input type="number" id="fdCount_${idPrefix}" inputmode="numeric" value="0" onclick="this.select()">
                        </div>
                        <div class="form-group">
                            <label>रक्कम (₹)</label>
                            <input type="number" id="fdAmt_${idPrefix}" inputmode="numeric" value="0" onclick="this.select()">
                        </div>
                        <div class="form-group">
                            <label>नवीन खाती</label>
                            <input type="number" id="fdNew_${idPrefix}" inputmode="numeric" value="0" onclick="this.select()">
                        </div>
                    </div>
                </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // Helper to send POST data
        async function sendPostData(payload) {
            const formData = new URLSearchParams(payload);
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });
                return await response.json();
            } catch (e) {
                return { success: false, message: 'Network Error' };
            }
        }

        // Main function to submit everything
        async function submitAllData() {
            const btn = document.getElementById('mainSubmitBtn');
            const entryDate = document.getElementById('entryDate').value;
            const entryTime = document.getElementById('entryTime').value;

            if(!entryDate || !entryTime) {
                showToast("तारीख आणि वेळ भरणे आवश्यक आहे.", "error");
                return;
            }

            btn.disabled = true;
            btn.textContent = "सेव्ह होत आहे... कृपया थांबा";
            
            let hasErrors = false;
            let dataSubmitted = false;

            // 1. Submit Bank Balance if greater than 0
            const sysBal = parseFloat(document.getElementById('systemBalance').value) || 0;
            const bnkBal = parseFloat(document.getElementById('bankBalance').value) || 0;
            
            if (sysBal > 0 || bnkBal > 0) {
                const bankPayload = {
                    formType: 'bank_balance',
                    systemBalance: sysBal,
                    bankBalance: bnkBal,
                    matchStatus: document.getElementById('matchStatus').value,
                    remarks: document.getElementById('remarks').value
                };
                const res = await sendPostData(bankPayload);
                if(!res.success) hasErrors = true;
                else dataSubmitted = true;
            }

            // 2. Loop through all Agent Cards and submit data if > 0
            for (let i = 0; i < globalAgentsList.length; i++) {
                const agentName = globalAgentsList[i].एजंटचे_नाव;
                const prefix = `agent_${i}`;

                // Fetch values
                const pCount = parseInt(document.getElementById(`pigmyCount_${prefix}`).value) || 0;
                const pAmt = parseFloat(document.getElementById(`pigmyAmt_${prefix}`).value) || 0;
                
                const rCount = parseInt(document.getElementById(`rdCount_${prefix}`).value) || 0;
                const rAmt = parseFloat(document.getElementById(`rdAmt_${prefix}`).value) || 0;
                const rNew = parseInt(document.getElementById(`rdNew_${prefix}`).value) || 0;

                const fCount = parseInt(document.getElementById(`fdCount_${prefix}`).value) || 0;
                const fAmt = parseFloat(document.getElementById(`fdAmt_${prefix}`).value) || 0;
                const fNew = parseInt(document.getElementById(`fdNew_${prefix}`).value) || 0;

                // Send Pigmy
                if (pCount > 0 || pAmt > 0) {
                    const res = await sendPostData({ formType: 'pigmy', agentName: agentName, accountCount: pCount, totalAmount: pAmt });
                    if(!res.success) hasErrors = true;
                    else dataSubmitted = true;
                }
                
                // Send RD
                if (rCount > 0 || rAmt > 0 || rNew > 0) {
                    const res = await sendPostData({ formType: 'rd', agentName: agentName, accountCount: rCount, totalAmount: rAmt, newAccountsToday: rNew });
                    if(!res.success) hasErrors = true;
                    else dataSubmitted = true;
                }

                // Send FD
                if (fCount > 0 || fAmt > 0 || fNew > 0) {
                    const res = await sendPostData({ formType: 'fd', agentName: agentName, accountCount: fCount, totalAmount: fAmt, newAccountsToday: fNew });
                    if(!res.success) hasErrors = true;
                    else dataSubmitted = true;
                }
            }

            // Restore Button
            btn.disabled = false;
            btn.textContent = "सर्वांचा डेटा सेव्ह करा";

            if (hasErrors) {
                showToast("काही डेटा सेव्ह करताना एरर आली. कनेक्शन तपासा.", "error");
            } else if (!dataSubmitted) {
                showToast("सेव्ह करण्यासाठी कोणताही नवीन डेटा भरलेला नाही.", "error");
            } else {
                showToast("✅ सर्व डेटा यशस्वीरित्या सेव्ह झाला!", "success");
                resetAllInputs();
            }
        }

        function resetAllInputs() {
            const inputs = document.querySelectorAll('input[type="number"]');
            inputs.forEach(input => input.value = 0);
            document.getElementById('remarks').value = '';
            window.scrollTo({ top: 0, behavior: 'smooth' }); // Scroll to top after success
        }

        // Add New Agent functionality
        async function addNewAgent() {
            const name = document.getElementById('newAgentName').value;
            const code = document.getElementById('newAgentCode').value;
            const contact = document.getElementById('newContactNumber').value;

            if(!name || !code) {
                showToast("एजंटचे नाव आणि कोड आवश्यक आहे.", "error");
                return;
            }

            showToast("एजंट जोडत आहे...", "success");
            const res = await sendPostData({
                formType: 'agent_add',
                agentName: name,
                agentCode: code,
                contactNumber: contact
            });

            if(res.success) {
                showToast("नवीन एजंट जोडला गेला!", "success");
                document.getElementById('newAgentName').value = '';
                document.getElementById('newAgentCode').value = '';
                document.getElementById('newContactNumber').value = '';
                
                // Reload agent list to show new agent card
                document.getElementById('loadingText').style.display = 'block';
                await loadAgents();
                document.getElementById('loadingText').style.display = 'none';
            } else {
                showToast("एरर: एजंट जोडता आला नाही.", "error");
            }
        }
    </script>
</body>
</html>
